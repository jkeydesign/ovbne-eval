<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVBNE 로고 시안 예비평가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    /* ─── 상수 & 가중치 ───────────────────────────────────── */
    const BRAND_WEIGHT = 0.6;
    const VISUAL_WEIGHT = 0.4;

    const LOGOS = Array.from({ length: 50 }, (_, i) => {
      const num = String(i + 1).padStart(2, '0');
      return { id: `L${num}`, imagePath: `logos/L${num}.png` };
    });


    /* ─── 유틸 함수 ───────────────────────────────────────── */
    function calcTotalScore(b, v) {
      return Math.round((b * BRAND_WEIGHT + v * VISUAL_WEIGHT) * 100) / 100;
    }
    function isCompleted(r) { return !!(r?.brand_score && r?.visual_score); }
    function generateId() {
      return 'xxxxxxxxxxxx'.replace(/x/g, () => Math.floor(Math.random() * 16).toString(16)) + '-' + Date.now().toString(36);
    }

    const STORAGE_KEY = 'ovbne_pilot_eval_v1';
    const saveData = d => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };
    const loadData = () => { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } };

    function buildResponseData(pid, ratings, tsStart) {
      const now = new Date().toISOString();
      const logos = [];
      for (let i = 1; i <= 50; i++) {
        const id = `L${String(i).padStart(2, '0')}`;
        const r = ratings[id];
        const b = r?.brand_score ?? null, v = r?.visual_score ?? null;
        const done = b !== null && v !== null;
        logos.push({ logo_id: id, brand_score: b, visual_score: v, total_score: done ? calcTotalScore(b, v) : null, completed: done, updated_at: r?.updated_at ?? null });
      }
      const done = logos.filter(l => l.completed);
      const avg = k => done.length ? Math.round(done.reduce((s, l) => s + l[k], 0) / done.length * 100) / 100 : null;
      const top27 = [...done].sort((a, b) => b.total_score - a.total_score).slice(0, 27).map(l => l.logo_id);
      return { participant_id: pid, timestamp_start: tsStart, timestamp_submit: now, logos, summary: { completed_count: done.length, brand_average: avg('brand_score'), visual_average: avg('visual_score'), total_average: avg('total_score'), top_27_logo_ids: top27 } };
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: filename });
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }
    const downloadJSON = data => triggerDownload(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), `ovbne_eval_${data.participant_id}.json`);
    const downloadCSV = data => {
      const cols = ['participant_id','logo_id','brand_score','visual_score','total_score','completed','updated_at','timestamp_submit'];
      const rows = data.logos.map(l => [data.participant_id, l.logo_id, l.brand_score??'', l.visual_score??'', l.total_score??'', l.completed, l.updated_at??'', data.timestamp_submit]);
      const csv = [cols, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
      triggerDownload(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }), `ovbne_eval_${data.participant_id}.csv`);
    };

    /* ─── IntroScreen ─────────────────────────────────────── */
    function IntroScreen({ onStart }) {
      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-12">
          <div className="max-w-2xl w-full bg-white border border-gray-200 rounded-lg p-8 sm:p-12">
            <div className="mb-8">
              <p className="text-xs font-medium tracking-widest text-gray-400 uppercase mb-3">박사학위논문 예비평가</p>
              <h1 className="text-2xl sm:text-3xl font-semibold text-gray-900 mb-1">OVBNE 로고 시안 예비평가</h1>
              <div className="w-12 h-px bg-gray-300 mt-4" />
            </div>
            <div className="space-y-4 text-sm leading-relaxed text-gray-700 mb-10">
              <p>본 평가는 박사학위논문 본실험에 사용할 로고 시안 자극을 선별하기 위한 예비평가입니다. 각 로고 시안의 객관적 우열을 가리는 것이 아니라, OVBNE 브랜드 브리프를 기준으로 각 시안의 브랜드 적합도와 시각 완성도를 확인하기 위한 절차입니다.</p>
              <p>로고 이미지 자체만 보고, 화면 좌측(또는 상단)의 브랜드 브리프와 판단 기준을 참고하여 평가해 주세요.</p>
            </div>
            <div className="bg-gray-50 border border-gray-200 rounded-md p-4 mb-8 text-sm text-gray-600 space-y-1.5">
              <p className="font-medium text-gray-800 mb-2">평가 안내</p>
              <p>• 총 50개 로고 시안을 평가합니다.</p>
              <p>• 각 시안마다 <strong>브랜드 종합 적합도</strong>와 <strong>시각 종합 완성도</strong> 2개 항목을 5점 척도로 평가합니다.</p>
              <p>• 응답은 자동 저장되며, 50개를 모두 평가한 후 제출할 수 있습니다.</p>
              <p>• 제출 후 JSON 및 CSV 파일로 결과를 다운로드할 수 있습니다.</p>
            </div>
            <button onClick={onStart} className="w-full py-3.5 bg-gray-900 text-white text-sm font-medium rounded-md hover:bg-gray-700 transition-colors">
              평가 시작하기
            </button>
          </div>
        </div>
      );
    }

    /* ─── BriefScreen ───────────────────────────────────────── */
    const BRIEF_GRID = [
      { label: '업종',      text: '리빙 오브제·홈데코 큐레이션 매장 및 온라인 쇼핑몰' },
      { label: '가격대',    text: '일반 생활용품 브랜드보다 높지만 고가 디자인 편집숍보다는 접근 가능한 미들 프리미엄 가격대. 소형 오브제·문구류는 약 1만~3만 원대, 홈데코 제품은 약 3만~8만 원대 중심으로 구성한다.' },
      { label: '타깃',      text: '25~35세 도시 거주자. 자기 취향과 감도 있는 소비를 중시하며, 과시적 고가 브랜드보다 일상 안에서 세련된 선택을 선호하는 소비자' },
      { label: '톤앤매너',  text: '세련되지만 차갑지 않고, 정돈되었지만 지나치게 고급스럽거나 권위적이지 않은 분위기' },
      { label: '개발 방향', text: '브랜드의 취향성과 접근성을 함께 전달하고, 다양한 매체에서 식별 가능하게 사용할 수 있어야 함' },
      { label: '브랜드 개요',text: '일상에서 사용하는 오브제, 문구, 홈데코 제품을 감도 있게 제안하는 신규 라이프스타일 브랜드' },
      { label: '포지셔닝',  text: '대중적 소품샵보다 감도 있고, 고가 편집숍보다 접근 가능한 미들 프리미엄 라이프스타일 브랜드. 취향을 가진 도시 생활자의 일상 공간에 자연스럽게 스며드는 오브제 브랜드로 위치시킨다.' },
      { label: '경쟁 맥락', text: '대형 라이프스타일 브랜드, 독립 오브제 브랜드, 온라인 감성 셀렉트숍과 경쟁' },
    ];
    const VALUE_TAGS = ['일상성', '균형감', '취향성'];
    const MEDIA_TAGS = ['제품 라벨', '패키지 스티커', '쇼핑백', '명함', '웹사이트', 'SNS 프로필', '온라인 배너', '제품 태그', '팝업 부스 사인'];

    function BriefScreen({ onStart, onBack }) {
      return (
        <div className="min-h-screen bg-gray-50 py-10 px-4">
          <div className="max-w-3xl mx-auto">

            <div className="mb-6">
              <p className="text-xs font-medium tracking-widest text-gray-400 uppercase mb-2">박사학위논문 예비평가</p>
              <h1 className="text-2xl font-bold text-gray-900 mb-1">브랜드 브리프</h1>
              <p className="text-sm text-gray-500 leading-relaxed">로고 시안을 보기 전, 브랜드의 맥락과 판단 기준이 되는 핵심 정보를 먼저 확인해 주세요.</p>
            </div>

            {/* 브랜드명 */}
            <div className="bg-white border border-gray-200 rounded-lg p-5 mb-3">
              <p className="font-semibold text-gray-400 uppercase tracking-widest mb-2" style={{fontSize:'10px'}}>브랜드명</p>
              <p className="text-2xl font-bold text-gray-900 mb-2">오브네 OVBNE</p>
              <p className="text-sm text-gray-600 leading-relaxed">OVBNE는 Objet, Value, Balance, New, Everyday의 의미를 결합한 조어로, 일상 오브제가 지닌 가치와 균형 잡힌 생활 감각, 새롭게 감각화된 일상을 의미한다.</p>
            </div>

            {/* 2열 그리드 */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
              {BRIEF_GRID.map(({ label, text }) => (
                <div key={label} className="bg-white border border-gray-200 rounded-lg p-4">
                  <p className="font-semibold text-gray-400 uppercase tracking-widest mb-1.5" style={{fontSize:'10px'}}>{label}</p>
                  <p className="text-sm text-gray-700 leading-relaxed">{text}</p>
                </div>
              ))}
            </div>

            {/* 핵심 가치 + 적용 매체 */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
              <div className="bg-white border border-gray-200 rounded-lg p-4">
                <p className="font-semibold text-gray-400 uppercase tracking-widest mb-2.5" style={{fontSize:'10px'}}>핵심 가치</p>
                <div className="flex gap-2 flex-wrap">
                  {VALUE_TAGS.map(k => (
                    <span key={k} className="px-3 py-1 border border-gray-900 text-gray-900 rounded-full text-sm font-medium">{k}</span>
                  ))}
                </div>
              </div>
              <div className="bg-white border border-gray-200 rounded-lg p-4">
                <p className="font-semibold text-gray-400 uppercase tracking-widest mb-2.5" style={{fontSize:'10px'}}>적용 매체</p>
                <div className="flex gap-1.5 flex-wrap">
                  {MEDIA_TAGS.map(m => (
                    <span key={m} className="px-2.5 py-1 border border-gray-300 text-gray-600 rounded-full text-xs">{m}</span>
                  ))}
                </div>
              </div>
            </div>

            {/* 안내 */}
            <div className="border border-gray-200 bg-white rounded-lg p-4 mb-5 text-sm text-gray-600 leading-relaxed">
              위 내용을 충분히 읽으신 후 평가를 시작해 주세요. 평가 중에도 좌측 패널에서 브리프를 다시 확인할 수 있습니다.
            </div>

            {/* 버튼 */}
            <div className="flex gap-3">
              {onBack && (
                <button onClick={onBack} className="px-6 py-3.5 border border-gray-300 text-gray-600 text-sm font-medium rounded-md hover:bg-gray-50 transition-colors">
                  ← 이전
                </button>
              )}
              <button onClick={onStart} className="flex-1 py-3.5 bg-gray-900 text-white text-sm font-medium rounded-md hover:bg-gray-700 transition-colors">
                평가 시작하기
              </button>
            </div>

          </div>
        </div>
      );
    }

    /* ─── CriteriaPanelContent ────────────────────────────── */
    function CriteriaPanelContent() {
      const [briefOpen, setBriefOpen] = useState(true);
      return (
        <div className="p-4 space-y-4">

          {/* Brand Brief (접힘/펼침) */}
          <section>
            <button onClick={() => setBriefOpen(v => !v)} className="w-full flex items-center justify-between mb-2">
              <h2 className="text-xs font-semibold text-gray-500 tracking-widest uppercase">Brand Brief</h2>
              <span className="text-gray-400 text-xs">{briefOpen ? '▲' : '▼'}</span>
            </button>
            {briefOpen && (
              <div className="text-xs text-gray-700 leading-relaxed space-y-2.5">
                <div>
                  <p className="font-semibold text-gray-900 text-sm">오브네 OVBNE</p>
                  <p className="text-gray-400" style={{fontSize:'10px'}}>Objet · Value · Balance · New · Everyday</p>
                </div>
                <div className="border-t border-gray-100" />
                <div className="space-y-0.5">
                  <p className="font-semibold text-gray-400 uppercase tracking-wider" style={{fontSize:'10px'}}>업종</p>
                  <p>리빙 오브제·홈데코 큐레이션 매장 및 온라인 쇼핑몰</p>
                </div>
                <div className="space-y-0.5">
                  <p className="font-semibold text-gray-400 uppercase tracking-wider" style={{fontSize:'10px'}}>포지셔닝</p>
                  <p>대중적 소품샵보다 감도 있고, 고가 편집숍보다 접근 가능한 미들 프리미엄 라이프스타일 브랜드. 취향을 가진 도시 생활자의 일상 공간에 자연스럽게 스며드는 오브제 브랜드로 위치시킨다.</p>
                </div>
                <div className="space-y-0.5">
                  <p className="font-semibold text-gray-400 uppercase tracking-wider" style={{fontSize:'10px'}}>가치 키워드</p>
                  <div className="flex gap-1.5 flex-wrap">
                    {['일상성','균형감','취향성'].map(k => (
                      <span key={k} className="px-1.5 py-0.5 bg-gray-100 text-gray-700 rounded font-medium" style={{fontSize:'10px'}}>{k}</span>
                    ))}
                  </div>
                </div>
                <div className="space-y-0.5">
                  <p className="font-semibold text-gray-400 uppercase tracking-wider" style={{fontSize:'10px'}}>타깃 고객</p>
                  <p>25~35세 도시 거주자. 자기 취향과 감도 있는 소비를 중시하며, 과시적 고가 브랜드보다 일상 안에서 세련된 선택을 선호하는 소비자</p>
                </div>
                <div className="space-y-0.5">
                  <p className="font-semibold text-gray-400 uppercase tracking-wider" style={{fontSize:'10px'}}>경쟁사 시각 특징</p>
                  <p>대형 라이프스타일 편집숍, 독립 소품샵, 온라인 감성 셀렉트숍과 경쟁. 이들은 감성 일러스트, 손글씨 서체, 자연 소재 이미지, 따뜻한 중립색을 주로 활용한다.</p>
                </div>
                <div className="space-y-0.5">
                  <p className="font-semibold text-gray-400 uppercase tracking-wider" style={{fontSize:'10px'}}>적용 환경</p>
                  <p className="text-gray-500">제품 라벨 · 패키지 스티커 · 쇼핑백 · 명함 · 웹사이트 · SNS 프로필 · 온라인 배너 · 제품 태그 · 팝업 부스 사인</p>
                </div>
              </div>
            )}
          </section>

          <div className="border-t border-gray-100" />

          {/* 평가 항목 */}
          <section>
            <h2 className="text-xs font-semibold text-gray-500 tracking-widest uppercase mb-2">평가 항목</h2>
            <div className="space-y-2">
              <div className="py-2.5 border-b border-gray-100">
                <p className="text-xs text-gray-800 leading-snug">
                  <span className="font-semibold text-gray-900 mr-1">B.</span>
                  <span className="font-medium">브랜드 종합 적합도</span>
                </p>
                <p className="text-xs text-gray-500 mt-0.5 leading-snug">이 로고 시안이 브랜드 브리프에 얼마나 적합한가?</p>
              </div>
              <div className="py-2.5">
                <p className="text-xs text-gray-800 leading-snug">
                  <span className="font-semibold text-gray-900 mr-1">V.</span>
                  <span className="font-medium">시각 종합 완성도</span>
                </p>
                <p className="text-xs text-gray-500 mt-0.5 leading-snug">이 로고 시안이 시각적으로 얼마나 완성도 있는가?</p>
              </div>
            </div>
          </section>

          <div className="border-t border-gray-100" />

          {/* 점수 척도 */}
          <section>
            <h2 className="text-xs font-semibold text-gray-500 tracking-widest uppercase mb-2">점수 척도</h2>
            <div className="grid grid-cols-5 gap-1 text-center">
              {[['1','전혀\n그렇지\n않다'],['2','그렇지\n않다'],['3','보통\n이다'],['4','그렇다'],['5','매우\n그렇다']].map(([n, label]) => (
                <div key={n}>
                  <div className="w-6 h-6 bg-gray-100 rounded-sm flex items-center justify-center text-gray-700 text-xs font-medium mx-auto mb-0.5">{n}</div>
                  <p className="text-gray-400 leading-tight whitespace-pre-line" style={{fontSize:'9px'}}>{label}</p>
                </div>
              ))}
            </div>
          </section>

        </div>
      );
    }

    /* ─── CriteriaPanel ───────────────────────────────────── */
    function CriteriaPanel({ mobile = false }) {
      const [open, setOpen] = useState(false);
      if (mobile) {
        return (
          <div className="bg-white shadow-sm">
            <button onClick={() => setOpen(v => !v)} className="w-full flex items-center justify-between px-4 py-3 text-left">
              <div className="flex items-center gap-2">
                <span className="text-xs font-semibold text-gray-700">브랜드 브리프 &amp; 판단 기준</span>
                {!open && <span className="text-xs text-gray-400">— 탭하여 펼치기</span>}
              </div>
              <span className="text-gray-400 text-xs">{open ? '▲ 접기' : '▼ 펼치기'}</span>
            </button>
            {open && <div className="border-t border-gray-100 max-h-64 overflow-y-auto"><CriteriaPanelContent /></div>}
          </div>
        );
      }
      return (
        <div className="h-full flex flex-col">
          <div className="px-4 py-4 border-b border-gray-100">
            <p className="text-xs font-semibold text-gray-500 tracking-widest uppercase">평가 참고 기준</p>
          </div>
          <div className="flex-1 overflow-y-auto"><CriteriaPanelContent /></div>
        </div>
      );
    }

    /* ─── LogoCard ────────────────────────────────────────── */
    function LogoCard({ logo, rating, onRate, onPreview, onHover, onHoverEnd }) {
      const [imgError, setImgError] = useState(false);
      const cardRef = useRef(null);
      const B = rating?.brand_score ?? null;
      const V = rating?.visual_score ?? null;
      const done = B !== null && V !== null;

      return (
        <div ref={cardRef} className={`bg-white rounded border flex flex-col select-none transition-shadow hover:shadow-sm ${done ? 'border-gray-400' : 'border-gray-200'}`}>
          <div
            className="aspect-square bg-gray-50 cursor-pointer overflow-hidden rounded-t relative"
            onMouseEnter={() => { if (cardRef.current) onHover(logo, cardRef.current.getBoundingClientRect()); }}
            onMouseLeave={onHoverEnd}
            onClick={() => onPreview(logo)}
          >
            {!imgError
              ? <img src={logo.imagePath} alt={logo.id} draggable={false} onError={() => setImgError(true)} className="w-full h-full object-contain p-1.5" />
              : <div className="w-full h-full flex flex-col items-center justify-center text-gray-300">
                  <svg className="w-5 h-5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" strokeWidth="1.5" />
                    <path d="M3 9l4-4 4 4 4-4 4 4" strokeWidth="1.5" strokeLinecap="round" />
                  </svg>
                  <span style={{fontSize:'9px'}}>{logo.id}</span>
                </div>
            }
            {done && <div className="absolute top-1 right-1 w-2 h-2 bg-gray-700 rounded-full" />}
          </div>
          <div className="p-1.5 pt-1">
            <p className="font-mono text-gray-400 mb-1 text-center" style={{fontSize:'10px'}}>{logo.id}</p>
            {/* Brand */}
            <div className="flex items-center gap-0.5 mb-0.5">
              <span className="font-bold text-gray-900 shrink-0 text-center" style={{fontSize:'10px', width:'14px'}}>B</span>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => onRate(logo.id, 'brand_score', n)}
                  style={{fontSize:'10px'}}
                  className={`flex-1 rounded-sm font-medium transition-colors leading-none ${B===n ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200 active:bg-gray-300'}`}
                  css={{height:'20px'}}>
                  <span style={{display:'block', lineHeight:'20px', height:'20px'}}>{n}</span>
                </button>
              ))}
            </div>
            {/* Visual */}
            <div className="flex items-center gap-0.5">
              <span className="font-bold text-gray-400 shrink-0 text-center" style={{fontSize:'10px', width:'14px'}}>V</span>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => onRate(logo.id, 'visual_score', n)}
                  style={{fontSize:'10px'}}
                  className={`flex-1 rounded-sm font-medium transition-colors leading-none ${V===n ? 'bg-gray-500 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200 active:bg-gray-300'}`}>
                  <span style={{display:'block', lineHeight:'20px', height:'20px'}}>{n}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ─── ImagePreviewModal ───────────────────────────────── */
    function ImagePreviewModal({ logo, onClose }) {
      const [imgError, setImgError] = useState(false);
      useEffect(() => {
        const h = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [onClose]);
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background:'rgba(0,0,0,0.5)'}} onClick={onClose}>
          <div className="bg-white rounded-lg shadow-xl p-4 mx-4" style={{maxWidth:'360px', width:'90vw'}} onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-3">
              <span className="text-sm font-mono text-gray-600 font-medium">{logo.id}</span>
              <button onClick={onClose} className="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded transition-colors">✕</button>
            </div>
            <div className="aspect-square bg-gray-50 rounded flex items-center justify-center overflow-hidden">
              {!imgError
                ? <img src={logo.imagePath} alt={logo.id} onError={() => setImgError(true)} className="w-full h-full object-contain p-4" />
                : <div className="flex flex-col items-center gap-2 text-gray-300">
                    <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" strokeWidth="1.5" /></svg>
                    <span className="text-sm">{logo.id} — 이미지 없음</span>
                  </div>
              }
            </div>
            <p className="text-center text-xs text-gray-400 mt-3">배경 클릭 또는 ESC 로 닫기</p>
          </div>
        </div>
      );
    }

    /* ─── HoverPreview ────────────────────────────────────── */
    function HoverPreview({ logo, pos }) {
      const [imgError, setImgError] = useState(false);
      return (
        <div className="fixed z-50 bg-white border border-gray-200 shadow-xl rounded-lg p-3 pointer-events-none" style={{top: pos.top, left: pos.left, width: 240}}>
          <div className="aspect-square bg-gray-50 rounded flex items-center justify-center overflow-hidden mb-2">
            {!imgError
              ? <img src={logo.imagePath} alt={logo.id} onError={() => setImgError(true)} className="w-full h-full object-contain p-3" />
              : <span className="text-gray-300 text-sm">{logo.id}</span>
            }
          </div>
          <p className="text-center text-xs font-mono text-gray-500">{logo.id}</p>
        </div>
      );
    }

    /* ─── LogoGrid ────────────────────────────────────────── */
    const FILTERS = [{value:'all',label:'전체'},{value:'incomplete',label:'미완료'},{value:'completed',label:'완료'}];
    const SORTS = [
      {value:'default',label:'기본 순서'},
      {value:'brand_desc',label:'브랜드 점수 높은 순'},
      {value:'visual_desc',label:'시각 점수 높은 순'},
      {value:'total_desc',label:'종합 점수 높은 순'},
      {value:'incomplete_first',label:'미완료 우선'},
    ];

    function LogoGrid({ logos, ratings, filter, sort, onFilter, onSort, onRate, onPreview, onHover, onHoverEnd }) {
      const filtered = useMemo(() => {
        let items = [...logos];
        if (filter === 'incomplete') items = items.filter(l => !isCompleted(ratings[l.id]));
        else if (filter === 'completed') items = items.filter(l => isCompleted(ratings[l.id]));
        if (sort === 'brand_desc') items.sort((a,b) => (ratings[b.id]?.brand_score??0)-(ratings[a.id]?.brand_score??0));
        else if (sort === 'visual_desc') items.sort((a,b) => (ratings[b.id]?.visual_score??0)-(ratings[a.id]?.visual_score??0));
        else if (sort === 'total_desc') items.sort((a,b) => {
          const ra=ratings[a.id],rb=ratings[b.id];
          return (isCompleted(rb)?calcTotalScore(rb.brand_score,rb.visual_score):0)-(isCompleted(ra)?calcTotalScore(ra.brand_score,ra.visual_score):0);
        });
        else if (sort === 'incomplete_first') items.sort((a,b)=>(isCompleted(ratings[a.id])?1:0)-(isCompleted(ratings[b.id])?1:0));
        return items;
      }, [logos, ratings, filter, sort]);

      return (
        <div className="p-3 sm:p-4">
          <div className="flex flex-wrap items-center gap-2 mb-3">
            <div className="flex gap-1">
              {FILTERS.map(f => (
                <button key={f.value} onClick={() => onFilter(f.value)}
                  className={`px-2.5 py-1 text-xs rounded font-medium transition-colors ${filter===f.value?'bg-gray-800 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                  {f.label}
                </button>
              ))}
            </div>
            <select value={sort} onChange={e => onSort(e.target.value)}
              className="text-xs px-2 py-1 border border-gray-200 rounded bg-white text-gray-700 focus:outline-none focus:border-gray-400">
              {SORTS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
            </select>
            <span className="text-xs text-gray-400 ml-auto">{filtered.length}개 표시</span>
          </div>
          <div className="flex gap-4 mb-3 text-gray-400" style={{fontSize:'10px'}}>
            <span><span className="inline-block w-3 h-3 bg-gray-900 rounded-sm mr-1 align-middle" />B = 브랜드 적합도</span>
            <span><span className="inline-block w-3 h-3 bg-gray-500 rounded-sm mr-1 align-middle" />V = 시각 완성도</span>
            <span><span className="inline-block w-2.5 h-2.5 bg-gray-700 rounded-full mr-1 align-middle" />평가 완료</span>
          </div>
          {filtered.length === 0
            ? <div className="py-16 text-center text-gray-400 text-sm">해당 조건의 로고가 없습니다.</div>
            : <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 2xl:grid-cols-10 gap-2">
                {filtered.map(logo => (
                  <LogoCard key={logo.id} logo={logo} rating={ratings[logo.id]}
                    onRate={onRate} onPreview={onPreview} onHover={onHover} onHoverEnd={onHoverEnd} />
                ))}
              </div>
          }
        </div>
      );
    }

    /* ─── ResultSummary ───────────────────────────────────── */
    function StatCard({ label, value }) {
      return (
        <div className="bg-gray-50 border border-gray-200 rounded-md p-4 text-center">
          <p className="text-xs text-gray-500 mb-1">{label}</p>
          <p className="text-2xl font-semibold text-gray-900">{value ?? '—'}</p>
        </div>
      );
    }

    function ResultSummary({ data, onDownloadJSON, onDownloadCSV }) {
      const { summary, logos } = data;
      const ranked = logos.filter(l => l.completed).sort((a,b) => b.total_score - a.total_score);
      const top27 = ranked.slice(0, 27);
      const rest = ranked.slice(27);
      const notDone = logos.filter(l => !l.completed);
      return (
        <div className="min-h-screen bg-gray-50 py-8 px-4">
          <div className="max-w-4xl mx-auto">
            <div className="mb-8">
              <p className="text-xs font-medium tracking-widest text-gray-400 uppercase mb-2">예비평가 완료</p>
              <h1 className="text-2xl font-semibold text-gray-900">OVBNE 로고 시안 평가 결과</h1>
              <p className="text-xs text-gray-400 mt-1">참가자 ID: {data.participant_id} &nbsp;|&nbsp; 제출 시각: {new Date(data.timestamp_submit).toLocaleString('ko-KR')}</p>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
              <StatCard label="평가 완료" value={`${summary.completed_count} / 50`} />
              <StatCard label="브랜드 평균" value={summary.brand_average?.toFixed(2)} />
              <StatCard label="시각 평균" value={summary.visual_average?.toFixed(2)} />
              <StatCard label="종합 평균" value={summary.total_average?.toFixed(2)} />
            </div>
            <div className="bg-gray-100 border border-gray-300 rounded-md p-4 mb-8 text-sm text-gray-700 leading-relaxed">
              상위 27개는 예비평가 점수에 따른 자동 산출 후보입니다. 최종 본실험 시안은 점수 분포, 스타일 중복, 세트 균형을 연구자가 추가 검토하여 확정합니다.
            </div>
            <div className="flex gap-3 mb-8">
              <button onClick={onDownloadJSON} className="px-5 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-md hover:bg-gray-700 transition-colors">JSON 다운로드</button>
              <button onClick={onDownloadCSV} className="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-50 transition-colors">CSV 다운로드</button>
            </div>
            <ResultTable title={<span className="flex items-center gap-2"><span className="w-5 h-5 bg-gray-900 text-white rounded-full text-xs flex items-center justify-center font-bold">27</span>종합 점수 상위 27개 (후보)</span>} rows={top27} startRank={1} />
            {rest.length > 0 && <ResultTable title={`나머지 ${rest.length}개`} rows={rest} startRank={28} dim />}
            {notDone.length > 0 && (
              <section className="mb-8">
                <h2 className="text-sm font-semibold text-gray-800 mb-2">미완료 ({notDone.length}개)</h2>
                <p className="text-xs text-gray-400 flex flex-wrap gap-2">{notDone.map(l => <span key={l.logo_id} className="font-mono">{l.logo_id}</span>)}</p>
              </section>
            )}
            <div className="border-t border-gray-200 pt-6 flex gap-3">
              <button onClick={onDownloadJSON} className="px-5 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-md hover:bg-gray-700 transition-colors">JSON 다운로드</button>
              <button onClick={onDownloadCSV} className="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-50 transition-colors">CSV 다운로드</button>
            </div>
          </div>
        </div>
      );
    }

    function ResultTable({ title, rows, startRank, dim = false }) {
      return (
        <section className="mb-8">
          <h2 className={`text-sm font-semibold mb-3 ${dim ? 'text-gray-600' : 'text-gray-800'}`}>{title}</h2>
          <div className="border border-gray-200 rounded-lg overflow-hidden">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50 border-b border-gray-200">
                  {['순위','시안','브랜드(B)','시각(V)','종합'].map((h,i) => (
                    <th key={h} className={`py-2.5 px-3 text-xs font-medium text-gray-500 ${i<2?'text-left':'text-right'} ${i===0?'w-12':i===1?'w-16':''}`}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {rows.map((l, i) => (
                  <tr key={l.logo_id} className="hover:bg-gray-50">
                    <td className="py-2 px-3 text-xs text-gray-400">{i + startRank}</td>
                    <td className={`py-2 px-3 font-mono text-xs font-medium ${dim?'text-gray-500':'text-gray-800'}`}>{l.logo_id}</td>
                    <td className={`py-2 px-3 text-right text-sm ${dim?'text-gray-400':'text-gray-700'}`}>{l.brand_score}</td>
                    <td className={`py-2 px-3 text-right text-sm ${dim?'text-gray-400':'text-gray-700'}`}>{l.visual_score}</td>
                    <td className={`py-2 px-3 text-right text-sm font-semibold ${dim?'text-gray-500':'text-gray-900'}`}>{l.total_score?.toFixed(2)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </section>
      );
    }

    /* ─── ProgressBar ─────────────────────────────────────── */
    function ProgressBar({ count, total, allDone, onSubmit, sidebarOpen, onShowSidebar, onBack }) {
      return (
        <div className="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center gap-3">
          {onBack && (
            <button onClick={onBack} className="text-xs text-gray-400 hover:text-gray-700 whitespace-nowrap shrink-0" title="브랜드 브리프로 돌아가기">← 브리프</button>
          )}
          {onShowSidebar && !sidebarOpen && (
            <button onClick={onShowSidebar} className="text-xs text-gray-500 hover:text-gray-800 whitespace-nowrap">☰ 기준 보기</button>
          )}
          <div className="text-sm font-medium text-gray-700 whitespace-nowrap">
            평가 완료: <span className="font-bold text-gray-900">{count}</span><span className="text-gray-400"> / {total}</span>
          </div>
          <div className="flex-1 bg-gray-100 h-1.5 rounded-full overflow-hidden">
            <div className="bg-gray-800 h-1.5 rounded-full transition-all duration-300" style={{width:`${count/total*100}%`}} />
          </div>
          <button onClick={onSubmit} disabled={!allDone}
            className={`px-4 py-1.5 text-xs font-semibold rounded whitespace-nowrap transition-colors ${allDone?'bg-gray-900 text-white hover:bg-gray-700':'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
            최종 제출
          </button>
        </div>
      );
    }

    /* ─── App ─────────────────────────────────────────────── */
    function calcPreviewPos(rect) {
      const W=240, H=270;
      let left = rect.right + 10;
      if (left + W > window.innerWidth - 8) left = rect.left - W - 10;
      return { top: Math.max(8, Math.min(rect.top, window.innerHeight - H - 8)), left: Math.max(8, left) };
    }

    function App() {
      const [screen, setScreen] = useState('intro');
      const [ratings, setRatings] = useState({});
      const [filter, setFilter] = useState('all');
      const [sort, setSort] = useState('default');
      const [previewLogo, setPreviewLogo] = useState(null);
      const [hoverPreview, setHoverPreview] = useState(null);
      const [resultData, setResultData] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [sidebarWidth, setSidebarWidth] = useState(256);
      const isResizing = useRef(false);
      const resizeStartX = useRef(0);
      const resizeStartW = useRef(0);

      const startResize = useCallback((e) => {
        e.preventDefault();
        isResizing.current = true;
        resizeStartX.current = e.clientX;
        resizeStartW.current = sidebarWidth;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      }, [sidebarWidth]);

      useEffect(() => {
        const onMove = (e) => {
          if (!isResizing.current) return;
          const newW = Math.max(160, Math.min(520, resizeStartW.current + e.clientX - resizeStartX.current));
          setSidebarWidth(newW);
        };
        const onUp = () => {
          if (!isResizing.current) return;
          isResizing.current = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
      }, []);

      const [pid] = useState(generateId);
      const [tsStart] = useState(() => new Date().toISOString());

      useEffect(() => { const s = loadData(); if (s?.ratings) setRatings(s.ratings); }, []);
      useEffect(() => { if (Object.keys(ratings).length > 0) saveData({ pid, tsStart, ratings }); }, [ratings]);

      const count = Object.values(ratings).filter(isCompleted).length;
      const allDone = count === LOGOS.length;

      const handleRate = useCallback((id, field, score) => {
        setRatings(prev => ({ ...prev, [id]: { ...prev[id], [field]: score, updated_at: new Date().toISOString() } }));
      }, []);

      const handleHover = useCallback((logo, rect) => setHoverPreview({ logo, pos: calcPreviewPos(rect) }), []);
      const handleHoverEnd = useCallback(() => setHoverPreview(null), []);
      const handleSubmit = () => { const d = buildResponseData(pid, ratings, tsStart); setResultData(d); setScreen('result'); };

      if (screen === 'intro') return <IntroScreen onStart={() => setScreen('brief')} />;
      if (screen === 'brief') return <BriefScreen onStart={() => setScreen('evaluate')} onBack={() => setScreen('intro')} />;
      if (screen === 'result') return <ResultSummary data={resultData} onDownloadJSON={() => downloadJSON(resultData)} onDownloadCSV={() => downloadCSV(resultData)} />;

      return (
        <div className="min-h-screen bg-gray-50 flex">
          {/* PC 사이드바 */}
          {sidebarOpen && (
            <>
              <aside className="hidden lg:flex flex-col shrink-0 bg-white border-r border-gray-200" style={{width: sidebarWidth + 'px'}}>
                <div className="sticky top-0 flex flex-col" style={{height:'100vh'}}>
                  <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100">
                    <span className="text-xs font-semibold text-gray-500 tracking-widest uppercase">평가 참고 기준</span>
                    <button onClick={() => setSidebarOpen(false)} className="text-gray-300 hover:text-gray-600 text-xs">✕</button>
                  </div>
                  <div className="flex-1 overflow-y-auto"><CriteriaPanel /></div>
                </div>
              </aside>
              <div
                className="hidden lg:block shrink-0 bg-gray-200 hover:bg-gray-400 transition-colors duration-150"
                style={{width:'4px', cursor:'col-resize'}}
                onMouseDown={startResize}
                title="드래그하여 패널 너비 조절"
              />
            </>
          )}
          <div className="flex-1 flex flex-col min-w-0">
            {/* 모바일 */}
            <div className="lg:hidden sticky top-0 z-20">
              <CriteriaPanel mobile />
              <ProgressBar count={count} total={LOGOS.length} allDone={allDone} onSubmit={handleSubmit} sidebarOpen={false} onShowSidebar={null} onBack={() => setScreen('brief')} />
            </div>
            {/* PC */}
            <div className="hidden lg:block sticky top-0 z-10">
              <ProgressBar count={count} total={LOGOS.length} allDone={allDone} onSubmit={handleSubmit} sidebarOpen={sidebarOpen} onShowSidebar={() => setSidebarOpen(true)} onBack={() => setScreen('brief')} />
            </div>
            <LogoGrid logos={LOGOS} ratings={ratings} filter={filter} sort={sort}
              onFilter={setFilter} onSort={setSort} onRate={handleRate}
              onPreview={setPreviewLogo} onHover={handleHover} onHoverEnd={handleHoverEnd} />
          </div>
          {hoverPreview && <HoverPreview logo={hoverPreview.logo} pos={hoverPreview.pos} />}
          {previewLogo && <ImagePreviewModal logo={previewLogo} onClose={() => setPreviewLogo(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
