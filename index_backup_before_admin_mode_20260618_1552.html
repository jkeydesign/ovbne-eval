      let left = rect.right + 10;
      if (left + W > window.innerWidth - 8) left = rect.left - W - 10;
      return { top: Math.max(8, Math.min(rect.top, window.innerHeight - H - 8)), left: Math.max(8, left) };

    function App() {

      const [basicInfo, setBasicInfo] = useState({});
      const sidebarOpen = true;
      const [sidebarWidth, setSidebarWidth] = useState(256);
      const isResizing = useRef(false);
      const resizeStartX = useRef(0);
      const resizeStartW = useRef(0);

      const startResize = useCallback((e) => {
        e.preventDefault();
        isResizing.current = true;
        resizeStartX.current = e.clientX;
        resizeStartW.current = sidebarWidth;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      }, [sidebarWidth]);

      useEffect(() => {
        const onMove = (e) => {
          if (!isResizing.current) return;
          const newW = Math.max(160, Math.min(window.innerWidth - 250, resizeStartW.current + e.clientX - resizeStartX.current));
          setSidebarWidth(newW);
        };
        const onUp = () => {
          if (!isResizing.current) return;
          isResizing.current = false;
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        return () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
      }, []);

          .then(records => {
            if (!active) return;

          })
          .catch(error => {
            if (!active) return;
            setManifestStatus({ loading: false, error: error.message });
          });
        return () => { active = false; };
      }, []);
      useEffect(() => { const s = loadData(); if (s?.excludedIds || s?.eliminatedIds) setEliminatedIds(s.excludedIds || s.eliminatedIds); }, []);

        const s = loadData();

      }, []);

        if (!logos.length || !eliminatedIds.length) return;
        const validIds = new Set(logos.map(logo => logo.id));
        const cleaned = eliminatedIds.filter(id => validIds.has(id));
        if (cleaned.length !== eliminatedIds.length) setEliminatedIds(cleaned);
      }, [logos, eliminatedIds]);
      useEffect(() => { if (eliminatedIds.length > 0) saveData({ pid, tsStart, excludedIds: eliminatedIds }); }, [eliminatedIds]);
      useEffect(() => {
        if (!evaluationLogos.length) return;
        const validIds = new Set(evaluationLogos.map(logo => logo.id));
        const cleaned = Object.fromEntries(Object.entries(dimensionRatingDraft).filter(([id]) => validIds.has(id)));
        if (Object.keys(cleaned).length !== Object.keys(dimensionRatingDraft).length) {
          setDimensionRatingDraft(cleaned);
          saveData({ dimensionRatingDraft: cleaned });

      }, [evaluationLogos, dimensionRatingDraft]);
      useEffect(() => {
        window.history.replaceState({ screen: 'intro' }, '', window.location.href);
        historyReady.current = true;
        const onPopState = (event) => {
          const nextScreen = event.state?.screen || 'intro';

          totalExcluded: eliminatedIds.length,

        const submission = {

          timestamp_start: tsStart,

          basicInfo: data,
          excluded_candidate_ids: eliminatedIds,
          formationGate,

        if (submission.dimensionRatings && submission.dimensionRatings.length > 0) {
          const dimCols = ['evaluatorId', 'stimulusId', 'preEvalGroup', 'localStimulusCode', 'candidateId', 'typeCode', 'naturalness', 'harmony', 'refinement'];

          const dimCsv = [dimCols, ...dimRows].map(r => r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')).join('\r\n');
          triggerDownload(new Blob(['я╗? + dimCsv], { type: 'text/csv;charset=utf-8;' }), `pretest_dimension_ratings_${pid}.csv`);
        }
        // Export full submission JSON
        triggerDownload(new Blob([JSON.stringify(submission, null, 2)], { type: 'application/json' }), `pretest_submission_${pid}.json`);
        setBasicInfo(data);

        goScreen('complete');

      if (screen === 'eliminateReview') return <EliminationReviewScreen key={eliminatedIds.slice().sort().join(',')} logos={logos} excludedIds={eliminatedIds} onExcludeChange={setEliminatedIds} onBack={() => window.history.back()} onNext={goToSetAssignment} />;
      if (screen === 'dimensionRating') return <DimensionRatingScreen key={eliminatedIds.slice().sort().join(',')} candidates={evaluationLogos} initialRatings={dimensionRatingDraft} onRatingsChange={handleDimensionRatingDraftChange} onBack={() => window.history.back()} onNext={handleDimensionRatingNext} />;
      if (screen === 'setAssignment' && new URLSearchParams(window.location.search).has('admin')) return <SetAssignmentScreen candidates={evaluationLogos} onBack={() => window.history.back()} onNext={handleSetAssignmentNext} />;
      if (screen === 'basicInfo') return <BasicInfoScreen value={basicInfo} onChange={setBasicInfo} onBack={() => window.history.back()} onSubmit={handleBasicInfoSubmit} />;
      if (screen === 'complete') return <SubmissionCompleteScreen onFinish={() => { window.location.href = 'about:blank'; }} />;
      if (screen === 'review') return <ReviewScreen logos={evaluationLogos} ratings={ratings} timestampStart={tsStart} timestampElimStart={tsElimStart} timestampEvalStart={tsEvalStart} onBack={() => window.history.back()} onSubmit={handleFinalSubmit} />;
      if (screen === 'result') return <ResultSummary data={resultData} onDownloadJSON={() => downloadJSON(resultData)} onDownloadCSV={() => downloadCSV(resultData)} />;

      return (
        <div className="min-h-screen bg-gray-50 flex">
          {/* PC ?мьЭ┤?Ьы░Ф */}
          {sidebarOpen && (
            <>
              <aside className="hidden lg:flex flex-col shrink-0 bg-white border-r border-gray-200" style={{width: sidebarWidth + 'px'}}>
                <div className="sticky top-0 flex flex-col" style={{height:'100vh'}}>
                  <div className="flex-1 overflow-y-auto"><CriteriaPanel /></div>
                </div>
              </aside>
              <div
                className="hidden lg:block shrink-0 bg-gray-200 hover:bg-gray-400 transition-colors duration-150"
                style={{width:'4px', cursor:'col-resize'}}
                onMouseDown={startResize}
                title="?ЬыЮШъ╖╕эХШ???иыДР ?Иы╣Д ьб░ьаИ"
              />
            </>
          )}
          <div className="flex-1 flex flex-col min-w-0">
            {/* ыкиы░Ф??*/}
            <div className="lg:hidden sticky top-0 z-20">
              <CriteriaPanel mobile />
              <ProgressBar count={count} total={evaluationLogos.length} allDone={allDone} onSubmit={handleSubmit} onBack={() => setScreen('brief')} filter={filter} onFilter={setFilter} sort={sort} onSort={setSort} cardSize={cardSize} onCardSize={setCardSize} logos={evaluationLogos} ratings={ratings} timestampElimStart={tsElimStart} timestampEvalStart={tsEvalStart} />
            </div>
            {/* PC */}
            <div className="hidden lg:block sticky top-0 z-10">
              <ProgressBar count={count} total={evaluationLogos.length} allDone={allDone} onSubmit={handleSubmit} onBack={() => setScreen('brief')} filter={filter} onFilter={setFilter} sort={sort} onSort={setSort} cardSize={cardSize} onCardSize={setCardSize} logos={evaluationLogos} ratings={ratings} timestampElimStart={tsElimStart} timestampEvalStart={tsEvalStart} />
            </div>
            <LogoGrid logos={evaluationLogos} ratings={ratings} filter={filter} sort={sort}
              cardSize={cardSize} onRate={handleRate} onPreview={setPreviewLogo} />
          </div>
          {previewLogo && <ImagePreviewModal logo={previewLogo} onClose={() => setPreviewLogo(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
